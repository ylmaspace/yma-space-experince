<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YLMA Closed System</title>
  <style>
    :root { --bg:#070d19; --panel:#0f1a2f; --line:#22466e; --txt:#e4f3ff; --muted:#9ab4cf; --glow:#4dd8ff; }
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,sans-serif;background:radial-gradient(circle at top,#10234c 0%,var(--bg) 45%);color:var(--txt)}
    .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}.side{padding:14px;border-right:1px solid var(--line);background:#091225}.main{padding:14px}
    .btn{display:block;width:100%;margin-bottom:8px;padding:10px;border:1px solid var(--line);background:#133159;color:var(--txt);border-radius:8px;cursor:pointer;text-align:left}
    .btn.active,.btn:hover{box-shadow:0 0 14px rgba(77,216,255,.32)} .section{display:none}.section.active{display:block}
    .card{border:1px solid var(--line);background:rgba(15,26,47,.95);border-radius:12px;padding:12px;margin-bottom:10px}.grid{display:grid;grid-template-columns:1fr 370px;gap:10px}
    .sim{border:1px solid var(--line);border-radius:8px;background:#031022;width:100%;height:auto}.hud{font-size:13px;color:var(--muted)}
    input,select,textarea{width:100%;padding:8px;border-radius:8px;border:1px solid #2f567f;background:#081226;color:var(--txt)}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.carousel{display:flex;gap:8px;overflow:hidden}.pill{padding:8px 10px;border:1px solid #2a5e86;border-radius:8px;min-width:150px;text-align:center;background:#0b1c34}
    .pill.active{border-color:var(--glow);box-shadow:0 0 12px rgba(77,216,255,.35)} .log{max-height:170px;overflow:auto;background:#081224;padding:8px;border-radius:8px;border:1px solid #275078}
    .flash{animation: flash 0.3s ease-out}@keyframes flash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <h2>YLMA</h2>
      <button class="btn active" data-s="home">HOME</button>
      <button class="btn" data-s="competition">COMPETICION</button>
      <button class="btn" data-s="training">ENTRENAMIENTO</button>
      <button class="btn" data-s="forum">FORO</button>
      <button class="btn" data-s="store">TIENDA</button>
      <button class="btn" data-s="group">GRUPO</button>
      <div class="hud">XP: <span id="xp">0</span><br>NOVA: <span id="nova">0</span><br>Rank: <span id="rank">Cadete</span><br>Spec: <span id="specLabel">tecnico</span></div>
    </aside>

    <main class="main">
      <section id="home" class="section active">
        <div class="card"><h1>YLMA Space Experience</h1><p>Simulación física competitiva con tensión, feedback y progresión real.</p></div>
        <div class="card"><b>Noticias</b><div id="news" class="hud"></div></div>
      </section>

      <section id="competition" class="section">
        <div class="card">
          <h3>Matchmaking + Lobby (6)</h3>
          <button id="startComp">Iniciar competición</button>
          <div id="mm" class="hud">idle</div>
          <div id="lobby" class="hud">-</div>
          <div class="carousel" id="carousel"></div>
        </div>
        <div class="grid">
          <div class="card"><canvas id="sim" class="sim" width="900" height="520"></canvas></div>
          <div class="card" id="panelCard">
            <h3 id="arenaTitle">Arena</h3>
            <div id="arenaInstructions" class="hud"></div>
            <div id="arenaStats" class="hud"></div>
            <div class="row"><button id="thrustOn">THRUST</button><button id="thrustOff">OFF</button><button id="left">LEFT</button><button id="right">RIGHT</button></div>
            <div class="row"><button id="up">UP</button><button id="down">DOWN</button><button id="runCode">RUN CODE</button></div>
            <textarea id="codeInput" rows="6" placeholder="Solo para arena_code.js">return input + 1;</textarea>
            <button id="finish">Finalizar y evaluar</button>
            <div id="result" class="hud"></div>
            <div id="eventBanner" class="hud"></div>
          </div>
        </div>
      </section>

      <section id="training" class="section">
        <div class="card"><h3>Entrenamiento</h3><div class="row"><select id="trainArena"><option value="arena_orbit.js">Orbit</option><option value="arena_docking.js">Docking</option><option value="arena_code.js">Code</option><option value="arena_rendezvous.js">Rendezvous</option><option value="arena_wind_tunnel.js">Wind Tunnel</option></select><select id="trainDiff"><option value="1">Easy</option><option value="2">Medium</option><option value="3">Hard</option></select><button id="startTraining">Iniciar</button></div><div class="hud">Sin NOVA, solo XP reducida.</div></div>
      </section>

      <section id="forum" class="section">
        <div class="card"><h3>FORO</h3><input id="postTitle" placeholder="Título"/><textarea id="postBody" rows="3" placeholder="Contenido"></textarea><button id="postBtn">Publicar</button><div id="posts" class="log"></div></div>
        <div class="card"><h3>Chat</h3><div id="chat" class="log"></div><div class="row"><input id="chatInput" placeholder="mensaje"/><button id="chatBtn">Enviar</button></div></div>
      </section>

      <section id="store" class="section"><div class="card"><h3>Tienda / Progresión</h3><div id="storeList" class="hud"></div><div class="row"><button data-upg="fuel">Upgrade Fuel</button><button data-upg="thrust">Upgrade Thrust</button><button data-upg="control">Upgrade Control</button></div><label>Especialización<select id="spec"><option value="tecnico">Técnico (+control)</option><option value="agresivo">Agresivo (+thrust)</option><option value="eficiente">Eficiente (-consumo)</option></select></label></div></section>
      <section id="group" class="section"><div class="card"><h3>Grupo</h3><div class="row"><input id="groupCode" placeholder="Código"/><button id="joinGroup">Unirse</button></div><div id="groupMsg" class="hud"></div></div></section>
    </main>
  </div>

  <script type="module">
    const STORAGE = "ylma_closed_v2";
    const saved = JSON.parse(localStorage.getItem(STORAGE) || "{}");
    const state = {
      player: {
        xp: saved.xp || 0,
        nova: saved.nova || 0,
        rank: "Cadete",
        specialization: saved.specialization || "tecnico",
        upgrades: saved.upgrades || { fuelEfficiency: 1, thrustPower: 1, control: 1 },
        ownedArenas: ["arena_orbit.js", "arena_docking.js", "arena_code.js"],
      },
      pages: ["home", "competition", "training", "forum", "store", "group"],
      arena: null,
      arenaModule: null,
      running: false,
      replaying: false,
      posts: JSON.parse(localStorage.getItem("ylma_posts") || "[]"),
      chat: JSON.parse(localStorage.getItem("ylma_chat") || "[]"),
      audio: null,
    };

    const $ = (id) => document.getElementById(id);
    const ctx = $("sim").getContext("2d");
    const viewport = { width: 900, height: 520 };
    const weighted = [{k:"arena_orbit.js",w:4},{k:"arena_docking.js",w:3},{k:"arena_code.js",w:2},{k:"arena_rendezvous.js",w:3},{k:"arena_wind_tunnel.js",w:3}];

    function savePlayer() {
      localStorage.setItem(STORAGE, JSON.stringify({ xp: state.player.xp, nova: state.player.nova, upgrades: state.player.upgrades, specialization: state.player.specialization }));
    }

    function setRank() {
      const x = state.player.xp;
      state.player.rank = x >= 1800 ? "Ingeniero orbital" : x >= 900 ? "Comandante" : x >= 300 ? "Piloto" : "Cadete";
      $("xp").textContent = state.player.xp;
      $("nova").textContent = state.player.nova;
      $("rank").textContent = state.player.rank;
      $("specLabel").textContent = state.player.specialization;
      savePlayer();
    }

    function nav() {
      document.querySelectorAll(".btn").forEach((b) => b.onclick = () => {
        document.querySelectorAll(".btn").forEach((x) => x.classList.remove("active"));
        b.classList.add("active");
        state.pages.forEach((p) => $(p).classList.toggle("active", p === b.dataset.s));
      });
    }

    function renderFeed() {
      $("news").innerHTML = ["Evento orbital activo", "Desafío diario de acople", "Bonus grupal +8%", "Nuevo modo de daño progresivo"].map((x)=>`• ${x}`).join("<br>");
      $("storeList").innerHTML = [`Fuel Efficiency: x${state.player.upgrades.fuelEfficiency.toFixed(2)}`,`Thrust Power: x${state.player.upgrades.thrustPower.toFixed(2)}`,`Control: x${state.player.upgrades.control.toFixed(2)}`].join("<br>");
      $("posts").innerHTML = state.posts.map((p)=>`<div><b>${p.t}</b><br>${p.b}</div><hr>`).join("") || "Sin posts";
      $("chat").innerHTML = state.chat.map((m)=>`<div><b>${m.u}</b>: ${m.t}</div>`).join("") || "Sin chat";
      $("spec").value = state.player.specialization;
    }

    function initAudio() {
      if (state.audio) return state.audio;
      const ac = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      gain.gain.value = 0;
      osc.frequency.value = 110;
      osc.type = "sawtooth";
      osc.connect(gain); gain.connect(ac.destination); osc.start();
      state.audio = { ac, osc, gain, beepAt: 0 };
      return state.audio;
    }

    function updateAudio() {
      if (!state.running || !state.arena) return;
      const audio = initAudio();
      if (audio.ac.state === "suspended") audio.ac.resume();
      const now = audio.ac.currentTime;
      const speed = state.arena.ship ? Math.hypot(state.arena.ship.vx || 0, state.arena.ship.vy || 0) : 0;
      const activeThrust = state.arena.thrust?.active || false;
      audio.gain.gain.setTargetAtTime(activeThrust ? 0.08 : 0.01, now, 0.08);
      audio.osc.frequency.setTargetAtTime(95 + speed * 30 + (state.arena.ship?.heat || 0) * 0.4, now, 0.08);
      if ((state.arena.ship?.stability || 100) < 28 && now > audio.beepAt) {
        audio.beepAt = now + 0.5;
        const beep = audio.ac.createOscillator();
        const g = audio.ac.createGain();
        beep.frequency.value = 760; g.gain.value = 0.0001;
        beep.connect(g); g.connect(audio.ac.destination); beep.start(now); g.gain.exponentialRampToValueAtTime(0.06, now + 0.01); g.gain.exponentialRampToValueAtTime(0.0001, now + 0.15); beep.stop(now + 0.16);
      }
    }

    async function loadArena(file, difficulty = 2) {
      state.arenaModule = await import(`./${file}`);
      state.arena = state.arenaModule.setup({ difficulty, upgrades: state.player.upgrades, specialization: state.player.specialization });
      state.arena.challenge = state.arenaModule.challengeGenerator({ difficulty });
      const ui = state.arenaModule.ui(state.arena);
      $("arenaTitle").textContent = ui.title;
      $("arenaInstructions").textContent = ui.instructions;
      $("result").textContent = "";
      state.running = true;
      state.replaying = false;
      state.last = performance.now();
      requestAnimationFrame(loop);
    }

    function loop(now) {
      if (!state.running || !state.arenaModule || !state.arena || state.replaying) return;
      const dt = Math.min(0.05, (now - state.last) / 1000 || 0.016);
      state.last = now;
      const status = state.arenaModule.update(state.arena, dt);
      state.arenaModule.render(state.arena, ctx, viewport);
      updateAudio();
      const ui = state.arenaModule.ui(state.arena);
      $("arenaStats").textContent = Object.entries(ui.stats).map(([k,v])=>`${k}: ${typeof v === "number" ? v.toFixed(2) : v}`).join(" | ");
      $("eventBanner").textContent = ui.stats.event && ui.stats.event !== "none" ? `EVENTO: ${ui.stats.event}` : "";
      if (status.won || status.lost) finish(status.won, status.lost);
      else requestAnimationFrame(loop);
    }

    async function playReplay() {
      const history = state.arena?.history || [];
      if (!history.length) return;
      const frames = history.slice(-Math.min(180, history.length));
      state.replaying = true;
      state.running = false;
      for (const snap of frames) {
        if (state.arenaModule.renderReplay) state.arenaModule.renderReplay(state.arena, ctx, viewport, snap);
        await new Promise((r) => setTimeout(r, 28));
      }
      state.replaying = false;
    }

    async function finish(won, lostByFail = false) {
      state.running = false;
      const r = state.arenaModule.evaluate(state.arena, won);
      state.player.xp += r.xp;
      state.player.nova += r.nova;
      setRank();
      $("result").textContent = `${r.summary} | XP +${r.xp} | NOVA +${r.nova}`;
      if (won) {
        $("panelCard").classList.add("flash");
        setTimeout(()=>$("panelCard").classList.remove("flash"), 300);
      }
      if (lostByFail) {
        const audio = initAudio();
        const now = audio.ac.currentTime;
        const bo = audio.ac.createOscillator(); const g = audio.ac.createGain(); bo.frequency.value = 120; bo.connect(g); g.connect(audio.ac.destination); bo.start(now); g.gain.setValueAtTime(0.08, now); g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35); bo.stop(now + 0.36);
      }
      await new Promise((r2) => setTimeout(r2, 350));
      await playReplay();
    }

    function weightedArena() {
      const owned = new Set(state.player.ownedArenas);
      const pool = weighted.filter((a) => owned.has(a.k));
      const sum = pool.reduce((s, x) => s + x.w, 0);
      let r = Math.random() * sum;
      for (const p of pool) { r -= p.w; if (r <= 0) return p.k; }
      return pool[0]?.k || "arena_orbit.js";
    }

    $("startComp").onclick = async () => {
      $("mm").textContent = "Matchmaking... (máx 20s)";
      await new Promise((r) => setTimeout(r, 2000 + Math.random() * 4000));
      const humans = 1 + Math.floor(Math.random() * 6);
      const bots = Math.max(0, 6 - humans);
      $("lobby").textContent = `Lobby: ${humans} jugadores + ${bots} bots`;
      const cards = ["arena_orbit.js", "arena_docking.js", "arena_code.js", "arena_rendezvous.js", "arena_wind_tunnel.js"];
      let i = 0;
      const t = setInterval(()=>{ $("carousel").innerHTML = cards.map((c,idx)=>`<div class='pill ${idx===i?"active":""}'>${c}</div>`).join(""); i=(i+1)%cards.length; }, 160);
      await new Promise((r)=>setTimeout(r, 2600));
      clearInterval(t);
      const selected = weightedArena();
      $("carousel").innerHTML = cards.map((c)=>`<div class='pill ${c===selected?"active":""}'>${c}</div>`).join("");
      await loadArena(selected, 2);
    };

    $("startTraining").onclick = () => loadArena($("trainArena").value, Number($("trainDiff").value));
    $("finish").onclick = () => finish(false, true);
    $("thrustOn").onclick = () => state.arenaModule?.inputHandler(state.arena, "THRUST_ON");
    $("thrustOff").onclick = () => state.arenaModule?.inputHandler(state.arena, "THRUST_OFF");
    $("left").onclick = () => state.arenaModule?.inputHandler(state.arena, "LEFT");
    $("right").onclick = () => state.arenaModule?.inputHandler(state.arena, "RIGHT");
    $("up").onclick = () => state.arenaModule?.inputHandler(state.arena, "UP");
    $("down").onclick = () => state.arenaModule?.inputHandler(state.arena, "DOWN");
    $("runCode").onclick = () => {
      state.arenaModule?.inputHandler(state.arena, { type: "SET_CODE", value: $("codeInput").value });
      state.arenaModule?.inputHandler(state.arena, { type: "RUN" });
    };

    $("postBtn").onclick = () => {
      const t = $("postTitle").value.trim(); const b = $("postBody").value.trim();
      if (!t || !b) return;
      state.posts.unshift({ t, b });
      localStorage.setItem("ylma_posts", JSON.stringify(state.posts));
      state.player.xp += 12; setRank(); renderFeed();
    };
    $("chatBtn").onclick = () => {
      const t = $("chatInput").value.trim(); if (!t) return;
      state.chat.push({ u: "Pilot", t }); localStorage.setItem("ylma_chat", JSON.stringify(state.chat)); renderFeed();
    };

    document.querySelectorAll("[data-upg]").forEach((btn) => btn.onclick = () => {
      const cost = 60;
      if (state.player.nova < cost) return;
      state.player.nova -= cost;
      if (btn.dataset.upg === "fuel") state.player.upgrades.fuelEfficiency += 0.08;
      if (btn.dataset.upg === "thrust") state.player.upgrades.thrustPower += 0.08;
      if (btn.dataset.upg === "control") state.player.upgrades.control += 0.08;
      setRank(); renderFeed();
    });
    $("spec").onchange = (e) => { state.player.specialization = e.target.value; setRank(); renderFeed(); };

    $("joinGroup").onclick = () => { const c = $("groupCode").value.trim().toUpperCase(); if (c) $("groupMsg").textContent = `Grupo ${c} unido. Bonus activo +8%`; };

    nav(); setRank(); renderFeed();
  </script>
</body>
</html>
